server:
  port: 8080

spring:
  application:
    name: healthcare-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:healthcare_db}
    username: ${DB_USER:healthcare_user}
    password: ${DB_PASSWORD:healthcare_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # O Flyway controla o schema, então o Hibernate só valida se as
      # entidades batem com as tabelas — nunca cria/altera nada sozinho.
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Configurações customizadas do JWT (usadas na Parte 3)
jwt:
  secret: ${JWT_SECRET:troque-este-segredo-em-producao-por-uma-chave-forte-e-aleatoria}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}          # 1 hora
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 dias

# Swagger / OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.healthcare.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG